<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meesho Product Grid</title>
<style>
body {
  background: #f5f5f5;
  font-family: Arial, sans-serif;
  padding: 20px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;           /* 👈 adjust space between cards */
  max-width: 1100px;   /* 👈 total container width */
  margin: 0 auto;      /* center the grid */
}

.card {
  width: 240px;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 0 5px rgba(0,0,0,0.1);
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  font-size: 15px;
  padding: 8px 10px 0 10px;
  color: #333;
}

.price {
  padding: 5px 10px;
  font-weight: bold;
  font-size: 18px;
}

.old {
  text-decoration: line-through;
  color: #888;
  font-size: 13px;
  margin-left: 5px;
}

.off {
  color: green;
  font-size: 13px;
  margin-left: 5px;
}

.tag {
  display: inline-block;
  margin: 5px 10px;
  padding: 3px 8px;
  background: #f0edff;
  color: #6b4eff;
  border-radius: 12px;
  font-size: 12px;
}

.rating {
  display: flex;
  align-items: center;
  padding: 0 10px 10px 10px;
  font-size: 13px;
  color: #555;
}

.rating span {
  background: #34a853;
  color: #fff;
  padding: 2px 6px;
  border-radius: 10px;
  margin-right: 6px;
}
</style>
</head>
<body>


</body>
</html>
