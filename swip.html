<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category Slider</title>

  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #ffffff;
      margin: 0;
      padding: 20px;
    }

    .swiper {
      width: 100%;
      padding: 20px 0;
    }

    .category-card {
      width: 150px;
      height: 220px;
      background: linear-gradient(to bottom, #ebe7ff 60%, #7b2dff 60%);
      border-radius: 18px;
      overflow: hidden;
      text-align: center;
      position: relative;
      border: 1px solid #e4e4e4;
    }

    .category-card img {
      height: 120px;
      width: 100%;
      object-fit: contain;
      margin-top: 15px;
    }

    .category-card p {
      background: #7b2dff;
      color: #fff;
      margin: 0;
      padding: 10px 0;
      font-size: 16px;
      font-weight: 500;
      position: absolute;
      bottom: 0;
      width: 100%;
    }

    /* Navigation Buttons */
    .swiper-button-next,
    .swiper-button-prev {
      color: #000;
      background: #fff;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      box-shadow: 0px 0px 8px rgba(0, 0, 0, 0.1);
    }

    .swiper-button-next::after,
    .swiper-button-prev::after {
      font-size: 18px;
      font-weight: 700;
    }
  </style>
</head>

<body>

  <div class="swiper mySwiper">
    <div class="swiper-wrapper">

      <div class="swiper-slide">
        <div class="category-card">
          <img src="https://i.ibb.co/ZH5VvMZ/headphone.png" alt="">
          <p>Electronics</p>
        </div>
      </div>

      <div class="swiper-slide">
        <div class="category-card">
          <img src="https://i.ibb.co/Y0L46FJ/lipstick.png" alt="">
          <p>Makeup</p>
        </div>
      </div>

      <div class="swiper-slide">
        <div class="category-card">
          <img src="https://i.ibb.co/PYGhSW0/mobile.png" alt="">
          <p>Smart Phones</p>
        </div>
      </div>

      <div class="swiper-slide">
        <div class="category-card">
          <img src="https://i.ibb.co/jvBdZM6/perfume.png" alt="">
          <p>Men Perfume</p>
        </div>
      </div>

      <div class="swiper-slide">
        <div class="category-card">
          <img src="https://i.ibb.co/0Jv0mDg/bag.png" alt="">
          <p>Bags</p>
        </div>
      </div>

    </div>

    <!-- Arrows -->
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
  </div>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

  <script>
    var swiper = new Swiper(".mySwiper", {
      slidesPerView: 4,
      spaceBetween: 20,
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
      breakpoints: {
        0: { slidesPerView: 1.4 },
        480: { slidesPerView: 2.2 },
        768: { slidesPerView: 3 },
        1024: { slidesPerView: 4 }
      }
    });
  </script>

</body>
</html>
